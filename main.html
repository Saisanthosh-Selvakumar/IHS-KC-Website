<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Key Club</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: url('https://images.unsplash.com/photo-1523580494863-6f3031224c94?q=80&w=1600&auto=format&fit=crop')
      no-repeat center center/cover;
      min-height:100vh;
      color:white;
    }

    /* Dark overlay */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      z-index:-1;
    }

    /* NAVBAR */
    nav{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;
      backdrop-filter: blur(10px);
      background:rgba(0,0,0,0.35);
      position:fixed;
      top:0;
      z-index:1000;
      border-bottom:1px solid rgba(255,255,255,0.15);
    }

    .logo-section{
      display:flex;
      align-items:center;
      gap:18px;
    }

    .logo-section img{
      height:60px;
      width:auto;
      border-radius:10px;
      background:white;
      padding:5px;
    }

    .logo-section h1{
      font-size:28px;
      color:#FFD54F;
      letter-spacing:1px;
    }

    .nav-links{
      display:flex;
      gap:30px;
      list-style:none;
    }

    .nav-links a{
      text-decoration:none;
      color:white;
      font-size:18px;
      transition:0.3s;
      position:relative;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:0%;
      height:2px;
      background:#FFD54F;
      transition:0.3s;
    }

    .nav-links a:hover{
      color:#FFD54F;
    }

    .nav-links a:hover::after{
      width:100%;
    }

    /* HERO SECTION */
    .hero{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      min-height:100vh;
      padding:120px 20px 40px;
    }

    .hero h2{
      font-size:70px;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(0,0,0,0.6);
    }

    .hero p{
      max-width:800px;
      font-size:24px;
      line-height:1.6;
      margin-bottom:35px;
      text-shadow:0 0 10px rgba(0,0,0,0.7);
    }

    .hero button{
      padding:16px 36px;
      font-size:20px;
      border:none;
      border-radius:50px;
      background:#FFD54F;
      color:black;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
      box-shadow:0 0 20px rgba(255,213,79,0.5);
    }

    .hero button:hover{
      transform:scale(1.08);
      background:white;
    }

    /* LOGO DISPLAY */
    .logo-display{
      display:flex;
      gap:40px;
      margin-top:50px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .logo-card{
      background:rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding:25px;
      border-radius:25px;
      width:250px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.15);
    }

    .logo-card:hover{
      transform:translateY(-8px);
      background:rgba(255,255,255,0.18);
    }

    .logo-card img{
      width:100%;
      border-radius:15px;
      background:white;
      padding:10px;
    }

    .logo-card h3{
      margin-top:15px;
      color:#FFD54F;
    }

    @media(max-width:900px){
      nav{
        flex-direction:column;
        gap:15px;
        padding:20px;
      }

      .hero h2{
        font-size:48px;
      }

      .hero p{
        font-size:20px;
      }

      .nav-links{
        gap:18px;
        flex-wrap:wrap;
        justify-content:center;
      }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="logo-section">
      
      <!-- OLD KEY CLUB LOGO -->
      <img src="images/Temp.png" alt="Event Image">

      <!-- NEW KEY CLUB LOGO -->
      <img src="images/temp2electricbogaloo.png" alt="New Key Club Logo">

      <h1>Key Club</h1>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Events</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Serving Our Community</h2>

    <p>
      Welcome to our Key Club website!  
      Together we lead through service, build leadership,
      and create positive change in our school and community.
    </p>

    <button>Join Key Club</button>

    <div class="logo-display">

      <div class="logo-card">
        <img src="images/Temp.png" alt="Event Image">
        <h3>Classic Key Club Logo</h3>
      </div>

      <div class="logo-card">
        <img src="images/temp2electricbogaloo.png" alt="New Key Club Logo">
        <h3>Modern Key Club Logo</h3>
      </div>

    </div>
  </section>

</body>
</html>
